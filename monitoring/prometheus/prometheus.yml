global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'churn-api'
    metrics_path: '/actuator/prometheus'
    basic_auth:
      username: '__PROM_SCRAPE_USER__'
      password: '__PROM_SCRAPE_PASSWORD__'
    static_configs:
      - targets: ['app:__APP_PORT__']

  - job_name: 'cloudflare-tunnel'
    static_configs:
      - targets: [ 'tunnel:2000' ]